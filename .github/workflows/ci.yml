name: lint · test · audit

# Run on pushes to main and on every pull request. The GPU-free suite mocks ComfyUI, so it runs
# on a clean runner with no models, no GPU, no server.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write   # OIDC: lets codecov-action do a tokenless upload (no CODECOV_TOKEN needed)

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Developed on Windows; Linux proves the "anyone can fork this" promise.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (editable + dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff — correctness rules)
        run: ruff check .
      - name: Run tests (with coverage)
        run: python -m pytest --cov=scripts --cov-report=term-missing --cov-report=xml --cov-fail-under=85
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          use_oidc: true          # tokenless upload via GitHub OIDC (needs id-token: write above)
        continue-on-error: true   # advisory — never gate the merge on the coverage upload
      - name: Audit dependencies for known advisories (pip-audit)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true   # advisory: surface CVEs in the dep tree without gating the merge
        run: |
          python -m pip install pip-audit
          pip-audit --desc
      - name: CLI entry point smoke
        run: chimera --help
